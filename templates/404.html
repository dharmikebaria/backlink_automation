{% extends 'base.html' %}

{% block title %}404 Not Found - Backlink AI{% endblock %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center" style="min-height: 60vh;">
    <div class="float-card text-center p-5" style="max-width: 600px;">
        <div class="display-1 fw-bold text-warning mb-2">404</div>
        <h2 class="mb-4 text-secondary">Page Not Found</h2>
        <p class="text-muted mb-4 lead">It looks like you found a glitch in the matrix...</p>
        
        <div class="d-flex justify-content-center gap-3">
            <a href="{% url 'dashboard' %}" class="btn btn-primary-custom px-4">
                <i class="fas fa-home me-2"></i>Dashboard
            </a>
            <a href="javascript:history.back()" class="btn btn-light px-4">
                <i class="fas fa-arrow-left me-2"></i>Go Back
            </a>
        </div>
    </div>
</div>
{% endblock %}

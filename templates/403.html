{% extends 'base.html' %}

{% block title %}403 Forbidden - Backlink AI{% endblock %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center" style="min-height: 60vh;">
    <div class="float-card text-center p-5" style="max-width: 600px;">
        <div class="display-1 fw-bold text-danger mb-2">403</div>
        <h2 class="mb-4 text-secondary">Access Forbidden</h2>
        <p class="text-muted mb-4 lead">You don't have permission to access this resource.</p>
        
        <div class="d-flex justify-content-center gap-3">
            <a href="{% url 'login' %}" class="btn btn-primary-custom px-4">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </a>
            <a href="{% url 'dashboard' %}" class="btn btn-light px-4">
                <i class="fas fa-home me-2"></i>Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
